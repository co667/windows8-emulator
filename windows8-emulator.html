<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windows 8 Emulator</title>
    <style>
        body {
            background-color: #2E2E2E;
            color: white;
            font-family: Arial, sans-serif;
        }
        .start-screen {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            padding: 20px;
        }
        .tile {
            background-color: #0078D7;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            border-radius: 5px;
        }
        .taskbar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: #1A1A1A;
            height: 40px;
            display: flex;
            align-items: center;
            padding: 0 20px;
        }
        .charms {
            position: fixed;
            top: 0;
            right: 0;
            background-color: rgba(0, 0, 0, 0.7);
            width: 300px;
            height: 100%;
            display: none;
        }
        .charms.visible {
            display: block;
        }
    </style>
</head>
<body>
    <div class="start-screen">
        <div class="tile">Mail</div>
        <div class="tile">Calendar</div>
        <div class="tile">Store</div>
        <div class="tile">Weather</div>
        <div class="tile">News</div>
        <div class="tile">Music</div>
        <div class="tile">Photos</div>
        <div class="tile">Settings</div>
    </div>
    <div class="taskbar">
        <span>Start</span>
        <div style="flex-grow: 1;"></div>
        <span>Search</span>
        <span>Share</span>
        <span>Devices</span>
        <span>Settings</span>
    </div>
    <div class="charms" id="charms">
        <!-- Charms bar content goes here -->
    </div>
    <script>
        // JavaScript to handle charms visibility
        document.addEventListener('keydown', function(event) {
            if (event.key === 'c') {
                document.getElementById('charms').classList.toggle('visible');
            }
        });
    </script>
</body>
</html>
