<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windows 8 Emulator</title>
    <style>
        body {
            background-color: #2d2d30;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
        }
        .start-screen {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-gap: 10px;
            padding: 20px;
        }
        .tile {
            background-color: #0078d7;
            border-radius: 5px;
            padding: 20px;
            color: white;
            text-align: center;
            transition: background-color 0.3s;
            cursor: pointer;
        }
        .tile:hover {
            background-color: #005a9e;
        }
        .tile-icon {
            font-size: 2em;
        }
        .tile-label {
            margin-top: 10px;
            font-size: 1.2em;
        }
    </style>
    <script>
        function tileClicked(label) {
            alert('You clicked on ' + label);
        }
    </script>
</head>
<body>
    <div class="start-screen">
        <div class="tile" onclick="tileClicked('Mail')">
            <div class="tile-icon">📧</div>
            <div class="tile-label">Mail</div>
        </div>
        <div class="tile" onclick="tileClicked('Calendar')">
            <div class="tile-icon">📅</div>
            <div class="tile-label">Calendar</div>
        </div>
        <div class="tile" onclick="tileClicked('People')">
            <div class="tile-icon">👥</div>
            <div class="tile-label">People</div>
        </div>
        <div class="tile" onclick="tileClicked('Store')">
            <div class="tile-icon">🛒</div>
            <div class="tile-label">Store</div>
        </div>
        <div class="tile" onclick="tileClicked('Settings')">
            <div class="tile-icon">⚙️</div>
            <div class="tile-label">Settings</div>
        </div>
        <div class="tile" onclick="tileClicked('Photos')">
            <div class="tile-icon">🖼️</div>
            <div class="tile-label">Photos</div>
        </div>
        <div class="tile" onclick="tileClicked('News')">
            <div class="tile-icon">📰</div>
            <div class="tile-label">News</div>
        </div>
        <div class="tile" onclick="tileClicked('Maps')">
            <div class="tile-icon">🗺️</div>
            <div class="tile-label">Maps</div>
        </div>
    </div>
</body>
</html>
