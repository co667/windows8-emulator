<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windows 8 Emulator</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            background-color: #f3f3f3;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .start-menu {
            width: 300px;
            height: auto;
            background-color: #0078D7;
            border-radius: 5px;
            padding: 20px;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }
        .tile {
            width: 100px;
            height: 100px;
            background-color: #3C78D8;
            color: white;
            text-align: center;
            line-height: 100px;
            border-radius: 5px;
            margin: 5px;
            display: inline-block;
            font-size: 20px;
        }
        .tile:hover {
            background-color: #4A90E2;
        }
    </style>
</head>
<body>
    <div class="start-menu">
        <h1 style="color: white; text-align: center;">Start</h1>
        <div class="tiles">
            <div class="tile">Mail</div>
            <div class="tile">Calendar</div>
            <div class="tile">Photos</div>
            <div class="tile">Music</div>
            <div class="tile">Settings</div>
            <div class="tile">Store</div>
        </div>
    </div>
</body>
</html>
